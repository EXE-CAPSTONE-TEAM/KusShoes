name: Backend CI

on:
  pull_request:
    paths:
      - "BE/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "BE/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      REGISTRY_IMAGE: ${{ secrets.BACKEND_REGISTRY_IMAGE }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        working-directory: BE
        run: cp .env.example .env

      - name: Start backend stack
        working-directory: BE
        run: docker compose up -d --build

      - name: Prepare test database
        working-directory: BE
        run: |
          docker compose exec -T db psql -U kusshoes -d kusshoes -c "CREATE DATABASE kusshoes_test;" || true
          docker compose exec -T api sh -c "DATABASE_URL=postgresql+asyncpg://kusshoes:kusshoes@db:5432/kusshoes_test alembic upgrade head"

      - name: Run non-Polar tests
        working-directory: BE
        run: |
          docker compose exec -T api pytest \
            tests/test_auth.py \
            tests/test_account_security.py \
            tests/test_assets.py \
            tests/test_projects.py \
            tests/test_users.py \
            tests/test_user_p0.py \
            tests/test_architecture.py \
            tests/test_admin.py \
            -q -k "not refund"

      - name: Build production image
        run: docker build -t kusshoes-backend:${{ github.sha }} BE

      - name: Push production image
        if: github.ref == 'refs/heads/main' && env.REGISTRY_IMAGE != ''
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "${{ secrets.REGISTRY_HOST }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin
          docker tag kusshoes-backend:${{ github.sha }} "$REGISTRY_IMAGE:${{ github.sha }}"
          docker tag kusshoes-backend:${{ github.sha }} "$REGISTRY_IMAGE:latest"
          docker push "$REGISTRY_IMAGE:${{ github.sha }}"
          docker push "$REGISTRY_IMAGE:latest"

      - name: Stop stack
        if: always()
        working-directory: BE
        run: docker compose down -v
