# HTTP: phục vụ ACME challenge (certbot) + redirect sang HTTPS.
# File này luôn active. Block HTTPS nằm ở kusshoes-https.conf.template —
# sau khi cấp cert lần đầu thành công, đổi tên thành kusshoes-https.conf
# rồi reload nginx (xem SETUP_CLOUD_SERVICES.md bước 6).

server {
    listen 80;
    server_name api.kusshoes.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
