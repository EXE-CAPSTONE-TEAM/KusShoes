services:

  # ────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: kusshoes_db
    environment:
      POSTGRES_DB: kusshoes
      POSTGRES_USER: kusshoes
      POSTGRES_PASSWORD: kusshoes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kusshoes"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kusshoes_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: kusshoes_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Tự động tạo bucket khi MinIO khởi động lần đầu, chạy 1 lần rồi thoát
  minio-init:
    image: minio/mc
    container_name: kusshoes_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/kusshoes &&
        mc anonymous set download local/kusshoes/thumbnails &&
        echo '✅ MinIO bucket ready'
      "
    restart: "no"

  # ────────────────────────────────────────────
  # Application
  # ────────────────────────────────────────────

  api:
    build: .
    container_name: kusshoes_api
    ports:
      - "8000:8000"   # API:     http://localhost:8000
                      # Swagger: http://localhost:8000/docs
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app               # hot reload — code thay đổi ngay lập tức
      - ./scripts:/app/scripts       # dev seed/admin scripts
      - ./migrations:/app/migrations # alembic migrations
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests           # chạy pytest từ trong container
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build: .
    container_name: kusshoes_worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    command: celery -A app.workers.celery_app worker --loglevel=info -Q high,normal,low,bake
    restart: unless-stopped

  beat:
    build: .
    container_name: kusshoes_beat
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
